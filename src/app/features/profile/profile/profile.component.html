<!-- Main Content -->
<div class="main-content">

  <!-- Profile Container -->
  <div class="profile-container">
    
    <!-- Profile Image -->
    <div class="profile-image">
      <div class="avatar">
        <span class="avatar-letter">?</span>
      </div>
      <button class="add-button">
        <i class="camera-icon"></i> Add
      </button>
    </div>

    <!-- Profile Title & Description -->
    <h2 class="profile-title">My profile</h2>
    <p class="profile-desc">
      Hosts and guests can see your profile, and it may appear across Airbnb to help us build trust in our
      community.
    </p>

    <!-- Profile Sections -->
    <div class="profile-card" *ngFor="let section of profileSections">
      <h3>{{ section.title }}</h3>
      <div class="profile-item" *ngFor="let item of section.items">
        <div class="left">
          <span class="icon">{{ item.icon }}</span>
          <span class="text">{{ item.text }}</span>
        </div>
        <span class="arrow">›</span>
      </div>
    </div>

  </div>

</div>
