<div class="login-container">
  <app-header></app-header>
  
  <!-- Background -->
  <div class="login-image">
    <img src="/assets/home-bg-img01.jpg" alt="Login Image">
  </div>

  <!-- Centered Content -->
  <div class="login-content">
    <h1 class="main-logo">BNB</h1>
    <p class="subtext">Management System</p>
  </div>

  <div class="login-card" *ngIf="showLogin">
    <h2 style="color: #00AA90;">Member Login</h2>
    <form (ngSubmit)="onLogin()">
      <input type="email" [(ngModel)]="email" name="email" placeholder="Email" required>
      <input type="password" [(ngModel)]="password" name="password" placeholder="Password" required>
      
      <button type="submit">Login</button>
      <a routerLink="/register" class="btn-register">Register</a>
    </form>
    
    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
  </div>
</div>
